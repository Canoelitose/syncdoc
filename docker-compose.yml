services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: syncdoc
      POSTGRES_PASSWORD: syncdoc_dev
      POSTGRES_DB: syncdoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://syncdoc:syncdoc_dev@db:5432/syncdoc
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
